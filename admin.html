<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康产品排行榜 - 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            background: linear-gradient(135deg, #4a9f71 0%, #2d7a50 100%);
            color: #fff;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .nav-links {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 16px;
        }
        
        .nav-links a {
            color: #fff;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .nav-links a:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .stats-bar {
            background: #fff;
            padding: 16px 24px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #4a9f71;
        }
        
        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        
        .section-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #4a9f71;
        }
        
        .upload-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        
        .upload-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        
        .upload-card-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .product-rank {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #4a9f71, #2d7a50);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            margin-right: 10px;
        }
        
        .product-name {
            font-size: 15px;
            font-weight: 600;
            color: #333;
        }
        
        .product-tag {
            font-size: 11px;
            background: #e8f5e9;
            color: #2d7a50;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }
        
        .image-area {
            position: relative;
            width: 100%;
            height: 180px;
            border: 2px dashed #ddd;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            cursor: pointer;
            transition: all 0.3s;
            overflow: hidden;
            margin-bottom: 12px;
        }
        
        .image-area:hover {
            border-color: #4a9f71;
            background: #f0fff4;
        }
        
        .image-area.has-image {
            border-style: solid;
            border-color: #4a9f71;
        }
        
        .image-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .upload-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }
        
        .upload-text {
            font-size: 13px;
            color: #888;
            text-align: center;
        }
        
        .upload-hint {
            font-size: 11px;
            color: #aaa;
            margin-top: 4px;
        }
        
        .image-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .image-area:hover .image-actions {
            opacity: 1;
        }
        
        .action-btn {
            background: rgba(0,0,0,0.7);
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        
        .action-btn:hover {
            background: rgba(0,0,0,0.9);
        }
        
        .action-btn.delete {
            background: rgba(220,53,69,0.9);
        }
        
        .action-btn.delete:hover {
            background: rgba(220,53,69,1);
        }
        
        .link-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
        }
        
        .link-input:focus {
            outline: none;
            border-color: #4a9f71;
        }
        
        .batch-section {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        
        .batch-section h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 12px;
        }
        
        .batch-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .batch-row input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .batch-row input:focus {
            outline: none;
            border-color: #4a9f71;
        }
        
        .batch-btn {
            padding: 12px 24px;
            background: #4a9f71;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .batch-btn:hover {
            background: #2d7a50;
        }
        
        .batch-btn.secondary {
            background: #6c757d;
        }
        
        .batch-btn.secondary:hover {
            background: #5a6268;
        }
        
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        .preview-link {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #888;
            text-align: center;
        }
        
        .preview-link a {
            color: #4a9f71;
            text-decoration: none;
        }
        
        .preview-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🏥 健康产品排行榜管理后台</h1>
            <p>上传产品图片，管理系统配置</p>
            <div class="nav-links">
                <a href="index.html" target="_blank">📺 预览展示页面</a>
            </div>
        </header>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="uploaded-count">0</div>
                <div class="stat-label">已上传图片</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="linked-count">0</div>
                <div class="stat-label">已设置链接</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">10</div>
                <div class="stat-label">产品总数</div>
            </div>
        </div>
        
        <div class="batch-section">
            <h3>📦 批量设置</h3>
            <div class="batch-row">
                <input type="text" id="batch-image-url" placeholder="批量设置图片URL（如：https://example.com/images/product.jpg）">
                <button class="batch-btn" onclick="applyBatchImageUrl()">应用图片URL</button>
            </div>
            <div class="batch-row">
                <input type="text" id="batch-product-link" placeholder="批量设置产品链接（如：https://item.taobao.com/xxx.htm）">
                <button class="batch-btn" onclick="applyBatchProductLink()">应用产品链接</button>
            </div>
            <div class="batch-row">
                <button class="batch-btn secondary" onclick="clearAllData()">🗑️ 清除所有数据</button>
                <button class="batch-btn secondary" onclick="previewPage()">📺 预览展示页面</button>
            </div>
        </div>
        
        <h2 class="section-title">📷 产品图片管理</h2>
        
        <div class="upload-grid" id="upload-grid">
            <!-- 动态生成 -->
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <input type="file" id="hidden-file-input" accept="image/*" style="display:none" onchange="handleFileSelect(event)">
    
    <script>
        const products = [
            { id: 1, name: '氨糖软骨素', tag: '关节养护' },
            { id: 2, name: '液体钙+维生素D3', tag: '易吸收补钙' },
            { id: 3, name: 'GABA睡眠软糖', tag: '温和助眠' },
            { id: 4, name: '深海鱼油软胶囊', tag: '心脑养护' },
            { id: 5, name: '叶黄素酯软糖', tag: '眼部护理' },
            { id: 6, name: '成人复合维生素B族', tag: '能量补充' },
            { id: 7, name: '中老年益生菌', tag: '肠道调理' },
            { id: 8, name: '葛根枳椇子片', tag: '日常养护' },
            { id: 9, name: '中老年高钙蛋白粉', tag: '营养补充' },
            { id: 10, name: '艾草颈椎腰椎贴', tag: '外用舒缓' }
        ];
        
        let currentUploadId = null;
        
        // 初始化
        function init() {
            renderUploadGrid();
            updateStats();
        }
        
        // 渲染上传网格
        function renderUploadGrid() {
            const grid = document.getElementById('upload-grid');
            grid.innerHTML = '';
            
            products.forEach(product => {
                const data = getProductData(product.id);
                
                const card = document.createElement('div');
                card.className = 'upload-card';
                card.innerHTML = `
                    <div class="upload-card-header">
                        <span class="product-rank">${product.id}</span>
                        <span class="product-name">${product.name}</span>
                        <span class="product-tag">${product.tag}</span>
                    </div>
                    <div class="image-area ${data.image ? 'has-image' : ''}" id="image-area-${product.id}" onclick="triggerUpload(${product.id})">
                        ${data.image ? `
                            <img src="${data.image}" alt="${product.name}">
                            <div class="image-actions">
                                <button class="action-btn" onclick="event.stopPropagation(); triggerUpload(${product.id})">替换</button>
                                <button class="action-btn delete" onclick="event.stopPropagation(); deleteImage(${product.id})">删除</button>
                            </div>
                        ` : `
                            <span class="upload-icon">📷</span>
                            <span class="upload-text">点击上传产品图片</span>
                            <span class="upload-hint">支持 JPG、PNG 格式</span>
                        `}
                    </div>
                    <input type="text" class="link-input" id="link-${product.id}" placeholder="输入产品购买链接" value="${data.link || ''}" onchange="saveProductLink(${product.id})">
                    <div class="preview-link">
                        <a href="${data.link || '#'}" target="_blank" id="preview-link-${product.id}">${data.link ? '预览链接 ↗' : '暂无链接'}</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        
        // 获取产品数据
        function getProductData(id) {
            const data = localStorage.getItem('health_product_' + id);
            return data ? JSON.parse(data) : { image: null, link: '' };
        }
        
        // 保存产品数据
        function saveProductData(id, image, link) {
            const data = { image: image, link: link };
            localStorage.setItem('health_product_' + id, JSON.stringify(data));
            updateStats();
        }
        
        // 保存产品链接
        function saveProductLink(id) {
            const input = document.getElementById('link-' + id);
            const data = getProductData(id);
            data.link = input.value;
            saveProductData(id, data.image, input.value);
            
            const previewLink = document.getElementById('preview-link-' + id);
            if (input.value) {
                previewLink.href = input.value;
                previewLink.textContent = '预览链接 ↗';
            } else {
                previewLink.href = '#';
                previewLink.textContent = '暂无链接';
            }
            
            showToast('链接已保存');
        }
        
        // 触发上传
        function triggerUpload(id) {
            currentUploadId = id;
            document.getElementById('hidden-file-input').click();
        }
        
        // 处理文件选择
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file || !currentUploadId) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = getProductData(currentUploadId);
                data.image = e.target.result;
                saveProductData(currentUploadId, e.target.result, data.link);
                renderUploadGrid();
                showToast('图片上传成功');
            };
            reader.readAsDataURL(file);
            
            // 清空input
            event.target.value = '';
        }
        
        // 删除图片
        function deleteImage(id) {
            const data = getProductData(id);
            data.image = null;
            saveProductData(id, null, data.link);
            renderUploadGrid();
            showToast('图片已删除');
        }
        
        // 批量应用图片URL
        function applyBatchImageUrl() {
            const url = document.getElementById('batch-image-url').value.trim();
            if (!url) {
                showToast('请输入图片URL');
                return;
            }
            
            products.forEach(product => {
                const data = getProductData(product.id);
                if (!data.image) {
                    data.image = url;
                    saveProductData(product.id, url, data.link);
                }
            });
            
            renderUploadGrid();
            showToast('批量图片URL已应用');
        }
        
        // 批量应用产品链接
        function applyBatchProductLink() {
            const link = document.getElementById('batch-product-link').value.trim();
            if (!link) {
                showToast('请输入产品链接');
                return;
            }
            
            products.forEach(product => {
                const data = getProductData(product.id);
                data.link = link;
                saveProductData(product.id, data.image, link);
            });
            
            renderUploadGrid();
            showToast('批量产品链接已应用');
        }
        
        // 清除所有数据
        function clearAllData() {
            if (!confirm('确定要清除所有上传的图片和链接吗？此操作不可恢复。')) {
                return;
            }
            
            products.forEach(product => {
                localStorage.removeItem('health_product_' + product.id);
            });
            
            renderUploadGrid();
            showToast('所有数据已清除');
        }
        
        // 预览展示页面
        function previewPage() {
            window.open('index.html', '_blank');
        }
        
        // 更新统计
        function updateStats() {
            let uploadedCount = 0;
            let linkedCount = 0;
            
            products.forEach(product => {
                const data = getProductData(product.id);
                if (data.image) uploadedCount++;
                if (data.link) linkedCount++;
            });
            
            document.getElementById('uploaded-count').textContent = uploadedCount;
            document.getElementById('linked-count').textContent = linkedCount;
        }
        
        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
        
        // 初始化
        init();
    </script>
</body>
</html>
