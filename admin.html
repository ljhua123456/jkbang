<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康产品排行榜 - 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container { max-width: 1100px; margin: 0 auto; }

        /* 登录页 */
        #login-screen {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #2d7a50, #4a9f71);
            display: flex; align-items: center; justify-content: center; z-index: 99999;
        }
        #login-screen.hidden { display: none; }
        .login-box {
            background: #fff; padding: 40px 36px; border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center; width: 340px; max-width: 90vw;
        }
        .login-icon { font-size: 48px; margin-bottom: 12px; }
        .login-title { font-size: 20px; font-weight: 700; color: #2d7a50; margin-bottom: 4px; }
        .login-sub { font-size: 13px; color: #888; margin-bottom: 24px; }
        .login-input {
            width: 100%; padding: 12px 16px;
            border: 2px solid #e0e0e0; border-radius: 8px;
            font-size: 15px; text-align: center;
            letter-spacing: 4px; font-family: inherit;
            margin-bottom: 12px; transition: border-color 0.2s;
        }
        .login-input:focus { outline: none; border-color: #4a9f71; }
        .login-input.error { border-color: #e53935; animation: shake 0.4s; }
        @keyframes shake {
            0%,100%{transform:translateX(0)}
            20%,60%{transform:translateX(-6px)}
            40%,80%{transform:translateX(6px)}
        }
        .login-btn {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #2d7a50, #4a9f71);
            color: #fff; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; cursor: pointer;
        }
        .login-hint { font-size: 11px; color: #aaa; margin-top: 14px; }

        /* 修改密码弹窗 */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 999999;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #fff; border-radius: 12px; padding: 28px 24px;
            width: 320px; max-width: 90vw;
        }
        .modal-title { font-size: 16px; font-weight: 700; color: #2d7a50; margin-bottom: 16px; text-align: center; }
        .modal-hint { font-size: 12px; color: #888; margin: 10px 0 6px; }
        .modal-btn {
            width: 100%; padding: 12px; margin-top: 12px;
            background: linear-gradient(135deg, #2d7a50, #4a9f71);
            color: #fff; border: none; border-radius: 8px;
            font-size: 14px; cursor: pointer;
        }
        .modal-cancel {
            text-align: center; margin-top: 10px;
            font-size: 13px; color: #888; cursor: pointer;
        }

        /* 顶部 */
        .header {
            background: linear-gradient(135deg, #4a9f71, #2d7a50);
            color: #fff; padding: 24px; border-radius: 12px;
            margin-bottom: 20px; display: flex;
            align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 16px;
        }
        .header h1 { font-size: 22px; margin-bottom: 4px; }
        .header p { font-size: 13px; opacity: 0.9; }
        .header-links { display: flex; gap: 10px; flex-wrap: wrap; }
        .header-links a {
            color: #fff; text-decoration: none; padding: 8px 16px;
            background: rgba(255,255,255,0.2); border-radius: 6px;
            font-size: 13px; transition: background 0.2s;
        }
        .header-links a:hover { background: rgba(255,255,255,0.35); }

        /* 安全提示条 */
        .settings-bar {
            background: #fff3cd; border: 1px solid #ffeeba;
            padding: 14px 20px; border-radius: 10px;
            margin-bottom: 16px; display: flex;
            align-items: center; gap: 12px; flex-wrap: wrap;
            font-size: 13px; color: #856404;
        }
        .settings-bar span { flex: 1; }

        /* 工具栏 */
        .toolbar {
            background: #fff; padding: 14px 20px; border-radius: 10px;
            margin-bottom: 20px; display: flex; gap: 10px;
            flex-wrap: wrap; align-items: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .toolbar .info { font-size: 13px; color: #888; margin-right: auto; }

        .btn {
            padding: 9px 16px; border: none; border-radius: 6px;
            font-size: 13px; cursor: pointer;
            transition: all 0.2s; font-family: inherit;
            white-space: nowrap;
        }
        .btn-primary { background: #4a9f71; color: #fff; }
        .btn-primary:hover { background: #2d7a50; }
        .btn-secondary { background: #6c757d; color: #fff; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-warning:hover { background: #e0a800; }
        .btn-danger { background: #e53935; color: #fff; }
        .btn-danger:hover { background: #c62828; }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: #333; color: #fff;
            padding: 12px 24px; border-radius: 8px;
            font-size: 14px; z-index: 99999;
            transition: transform 0.3s;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* 统计 */
        .stats-row {
            display: flex; gap: 12px;
            margin-bottom: 20px; flex-wrap: wrap;
        }
        .stat-card {
            background: #fff; padding: 14px 20px;
            border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            flex: 1; min-width: 140px; text-align: center;
        }
        .stat-value { font-size: 24px; font-weight: 700; color: #4a9f71; }
        .stat-label { font-size: 12px; color: #888; margin-top: 2px; }

        /* 产品网格 */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
            gap: 16px;
        }
        @media (max-width: 520px) {
            .products-grid { grid-template-columns: 1fr; }
        }

        .product-card {
            background: #fff; border-radius: 12px;
            padding: 18px; box-shadow: 0 1px 6px rgba(0,0,0,0.07);
        }

        .card-header {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 14px; padding-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .rank-badge {
            width: 30px; height: 30px;
            background: linear-gradient(135deg, #4a9f71, #2d7a50);
            color: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 14px; flex-shrink: 0;
        }
        .card-title { font-size: 16px; font-weight: 600; color: #333; flex: 1; }
        .card-id { font-size: 11px; color: #aaa; background: #f5f5f5; padding: 2px 8px; border-radius: 10px; }

        /* 表单 */
        .form-group { margin-bottom: 10px; }
        .form-label { font-size: 12px; color: #666; font-weight: 500; margin-bottom: 4px; display: block; }
        .form-input {
            width: 100%; padding: 9px 12px;
            border: 1px solid #e0e0e0; border-radius: 6px;
            font-size: 13px; font-family: inherit;
            transition: border-color 0.2s; background: #fff;
        }
        .form-input:focus { outline: none; border-color: #4a9f71; background: #fafffe; }
        .form-textarea { resize: vertical; min-height: 70px; line-height: 1.6; }

        /* 图片区 */
        .image-zone { margin-bottom: 10px; }
        .image-preview-area {
            width: 100%; height: 130px;
            border: 2px dashed #ddd; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 4px;
            cursor: pointer; transition: all 0.2s;
            background: #fafafa; color: #bbb;
            font-size: 12px; overflow: hidden; position: relative;
        }
        .image-preview-area:hover { border-color: #4a9f71; background: #f0fff4; color: #4a9f71; }
        .image-preview-area.has-img { border-style: solid; border-color: #4a9f71; background: #f0fff4; }
        .image-preview-area img { width: 100%; height: 100%; object-fit: cover; }
        .preview-icon { font-size: 28px; }
        .preview-del {
            position: absolute; top: 5px; right: 5px;
            background: rgba(0,0,0,0.6); color: #fff;
            border: none; padding: 4px 8px; border-radius: 4px;
            font-size: 11px; cursor: pointer; display: none;
        }
        .image-preview-area:hover .preview-del { display: block; }
        .image-hint { font-size: 10px; color: #ccc; margin-top: 2px; }

        /* JSON弹窗 */
        .json-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 99998;
            align-items: center; justify-content: center; padding: 20px;
        }
        .json-modal-overlay.show { display: flex; }
        .json-modal {
            background: #fff; border-radius: 12px; width: 100%;
            max-width: 720px; max-height: 80vh;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .json-modal-header {
            padding: 14px 20px; background: #4a9f71; color: #fff;
            display: flex; align-items: center; justify-content: space-between;
            font-size: 14px; font-weight: 600;
        }
        .json-modal-close {
            background: none; border: none; color: #fff;
            font-size: 22px; cursor: pointer; line-height: 1;
        }
        .json-modal-body { flex: 1; overflow-y: auto; padding: 16px; }
        .json-modal-body p { font-size: 13px; color: #666; margin-bottom: 10px; }
        #json-output {
            width: 100%; height: 400px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px; line-height: 1.5;
            padding: 12px; border: 1px solid #e0e0e0;
            border-radius: 6px; resize: none;
            background: #f8f8f8; color: #333;
        }
        .json-modal-footer {
            padding: 12px 20px; border-top: 1px solid #eee;
            display: flex; gap: 10px; justify-content: flex-end;
        }
    </style>
</head>
<body>

    <!-- 登录页 -->
    <div id="login-screen">
        <div class="login-box">
            <div class="login-icon">🔐</div>
            <div class="login-title">管理后台</div>
            <div class="login-sub">请输入访问密码</div>
            <input type="password" class="login-input" id="login-pwd" placeholder="请输入密码" maxlength="20" onkeydown="if(event.key==='Enter')doLogin()">
            <button class="login-btn" onclick="doLogin()">登 录</button>
            <div class="login-hint">请输入正确密码进入管理后台</div>
        </div>
    </div>

    <!-- 修改密码弹窗 -->
    <div class="modal-overlay" id="change-pwd-modal">
        <div class="modal">
            <div class="modal-title">🔑 修改密码</div>
            <div class="modal-hint">新密码（6-20位）</div>
            <input type="password" id="new-pwd" class="login-input" style="text-align:left;letter-spacing:0;" placeholder="输入新密码">
            <div class="modal-hint">确认新密码</div>
            <input type="password" id="confirm-pwd" class="login-input" style="text-align:left;letter-spacing:0;" placeholder="再次输入新密码" onkeydown="if(event.key==='Enter')submitChangePwd()">
            <button class="modal-btn" onclick="submitChangePwd()">确认修改</button>
            <div class="modal-cancel" onclick="closeChangePwd()">取消</div>
        </div>
    </div>

    <!-- 主内容 -->
    <div id="main-content" style="display:none;">
        <div class="container">

            <header class="header">
                <div>
                    <h1>🏥 健康产品管理后台</h1>
                    <p>编辑产品信息后，点击「复制JSON」发给我推送上线</p>
                </div>
                <div class="header-links">
                    <a href="index.html" target="_blank">📺 预览网站</a>
                </div>
            </header>

            <!-- 安全提示条 -->
            <div class="settings-bar">
                <span>🔐 已登录 · 密码保护中</span>
                <button class="btn btn-secondary" onclick="showChangePwd()">🔑 修改密码</button>
                <button class="btn btn-danger" onclick="doLogout()">🚪 退出</button>
            </div>

            <!-- 统计 -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-value" id="stat-products">10</div>
                    <div class="stat-label">产品总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-images">0</div>
                    <div class="stat-label">已设置图片</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-links">0</div>
                    <div class="stat-label">已设置链接</div>
                </div>
            </div>

            <!-- 工具栏 -->
            <div class="toolbar">
                <span class="info" id="save-status">💾 输入即自动保存</span>
                <button class="btn btn-warning" onclick="resetAll()">🔄 恢复默认</button>
                <button class="btn btn-secondary" onclick="showJsonModal()">📋 查看JSON</button>
                <button class="btn btn-primary" onclick="copyJson()">📋 复制JSON</button>
            </div>

            <!-- 产品编辑 -->
            <div class="products-grid" id="products-grid"></div>

        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- JSON弹窗 -->
    <div class="json-modal-overlay" id="json-modal">
        <div class="json-modal">
            <div class="json-modal-header">
                <span>📋 products.json</span>
                <button class="json-modal-close" onclick="closeJsonModal()">×</button>
            </div>
            <div class="json-modal-body">
                <p>复制以下内容发给我，我来帮你推送到网站 👇</p>
                <textarea id="json-output" readonly></textarea>
            </div>
            <div class="json-modal-footer">
                <button class="btn btn-secondary" onclick="closeJsonModal()">关闭</button>
                <button class="btn btn-primary" onclick="copyJson()">📋 复制JSON</button>
            </div>
        </div>
    </div>

<script>
// ========== 数据 ==========
const DEFAULT_PRODUCTS = [
    {id:1,rank:1,name:"氨糖健骨片",tag:"关节养护",description:"采用高纯度氨基葡萄糖盐酸盐，配合软骨素科学配比，有效修复软骨组织，缓解关节疼痛与僵硬。适合长期久坐、关节劳损的中老年人群，每日2次，每次2粒，饭后温水送服。",image:"",link:""},
    {id:2,rank:2,name:"液体钙+维生素D3",tag:"易吸收补钙",description:"液态钙剂配合维生素D3促进钙质吸收，小分子结构更易被人体利用。预防骨质疏松、增强骨骼强度，口感好易服用，适合钙流失加速的中老年群体。",image:"",link:""},
    {id:3,rank:3,name:"GABA睡眠软糖",tag:"温和助眠",description:"添加γ-氨基丁酸（GABA）和酸枣仁提取物，天然温和配方，帮助改善睡眠质量，缓解入睡困难、多梦易醒等问题。软糖口感好，无依赖性。",image:"",link:""},
    {id:4,rank:4,name:"深海鱼油软胶囊",tag:"心脑养护",description:"来自北极深海纯净海域的鱼油，EPA+DHA含量高达30%，有助于调节血脂、呵护心脑血管健康。每一粒都是大自然的馈赠。",image:"",link:""},
    {id:5,rank:5,name:"叶黄素酯软糖",tag:"眼部护理",description:"富含叶黄素酯和蓝莓花青素，双重营养共同守护眼睛健康。缓解视疲劳、过滤蓝光伤害，适合长期看手机、电视的中老年用户。",image:"",link:""},
    {id:6,rank:6,name:"成人复合维生素B族",tag:"能量补充",description:"科学配比8种B族维生素，维持神经系统正常运作，提升精力活力，改善睡眠质量，缓解精神焦虑与疲劳感。每日1片，轻松补充。",image:"",link:""},
    {id:7,rank:7,name:"中老年益生菌",tag:"肠道调理",description:"专为中老年肠道环境设计，含多种活性益生菌菌株，调节肠道菌群平衡，改善便秘、腹胀等肠道问题，提升整体免疫力。",image:"",link:""},
    {id:8,rank:8,name:"葛根枳椇子片",tag:"日常养护",description:"传统草本配方，葛根配伍枳椇子、枸杞子，清肝明目、舒筋活络。适合长期饮酒、久坐办公、颈椎不适的人群日常调理使用。",image:"",link:""},
    {id:9,rank:9,name:"中老年高钙蛋白粉",tag:"营养补充",description:"优质动植物双蛋白配方，高钙含量，配合多种维生素和矿物质，全面补充中老年人每日所需营养，增强体质、提高免疫力。",image:"",link:""},
    {id:10,rank:10,name:"艾草颈椎腰椎贴",tag:"外用舒缓",description:"甄选艾草、红花、川芎等草本植物提取物，配合远红外陶瓷粉，持续温热理疗。贴敷舒适，哪痛贴哪，方便使用，适合关节肌肉不适人群。",image:"",link:""}
];

const DEFAULT_PWD = 'jkbang2026';
let products = [];
let autoSaveTimer = null;

// ========== 登录 ==========
function getPassword() {
    return localStorage.getItem('admin_pwd') || DEFAULT_PWD;
}

function doLogin() {
    const pwd = document.getElementById('login-pwd').value;
    if (pwd === getPassword()) {
        sessionStorage.setItem('admin_logged_in', '1');
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-content').style.display = 'block';
    } else {
        const input = document.getElementById('login-pwd');
        input.classList.add('error');
        input.value = '';
        input.placeholder = '密码错误，请重试';
        setTimeout(() => {
            input.classList.remove('error');
            input.placeholder = '请输入密码';
        }, 1200);
    }
}

function doLogout() {
    sessionStorage.removeItem('admin_logged_in');
    location.reload();
}

function showChangePwd() {
    document.getElementById('new-pwd').value = '';
    document.getElementById('confirm-pwd').value = '';
    document.getElementById('change-pwd-modal').classList.add('show');
}

function closeChangePwd() {
    document.getElementById('change-pwd-modal').classList.remove('show');
}

function submitChangePwd() {
    const newPwd = document.getElementById('new-pwd').value;
    const confirmPwd = document.getElementById('confirm-pwd').value;
    if (newPwd.length < 6 || newPwd.length > 20) {
        showToast('⚠️ 密码长度需6-20位');
        return;
    }
    if (newPwd !== confirmPwd) {
        showToast('⚠️ 两次密码不一致');
        return;
    }
    localStorage.setItem('admin_pwd', newPwd);
    closeChangePwd();
    showToast('✅ 密码修改成功');
}

function checkLogin() {
    if (sessionStorage.getItem('admin_logged_in') === '1') {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-content').style.display = 'block';
    } else {
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('login-pwd').focus();
    }
}

// ========== 数据操作 ==========
async function init() {
    // 优先从 localStorage 读
    const saved = localStorage.getItem('admin_products');
    if (saved) {
        try {
            products = JSON.parse(saved);
            renderAll();
            return;
        } catch(e) {}
    }
    // 其次从 products.json 读
    try {
        const res = await fetch('products.json');
        if (res.ok) {
            const data = await res.json();
            products = data.products;
            saveLocal();
            renderAll();
            return;
        }
    } catch(e) {}
    // 兜底默认
    products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
    saveLocal();
    renderAll();
}

function saveLocal() {
    localStorage.setItem('admin_products', JSON.stringify(products));
}

function scheduleSave() {
    if (autoSaveTimer) clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => {
        saveLocal();
        updateStats();
    }, 600);
}

// ========== 渲染 ==========
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderAll() {
    renderProducts();
    updateStats();
}

function renderProducts() {
    const grid = document.getElementById('products-grid');
    grid.innerHTML = '';

    products.forEach((p, idx) => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
            <div class="card-header">
                <span class="rank-badge">${p.rank}</span>
                <span class="card-title" id="title-${idx}">${escapeHtml(p.name)}</span>
                <span class="card-id">#${p.id}</span>
            </div>

            <div class="form-group">
                <label class="form-label">产品名称</label>
                <input type="text" class="form-input" id="inp-name-${idx}" value="${escapeHtml(p.name)}"
                    placeholder="输入产品名称"
                    oninput="onFieldChange(${idx}, 'name', this.value)">
            </div>

            <div class="form-group">
                <label class="form-label">标签（如：关节养护）</label>
                <input type="text" class="form-input" id="inp-tag-${idx}" value="${escapeHtml(p.tag)}"
                    placeholder="产品标签"
                    oninput="onFieldChange(${idx}, 'tag', this.value)">
            </div>

            <div class="form-group">
                <label class="form-label">产品介绍</label>
                <textarea class="form-input form-textarea" id="inp-desc-${idx}"
                    placeholder="输入产品介绍"
                    oninput="onFieldChange(${idx}, 'description', this.value)">${escapeHtml(p.description)}</textarea>
            </div>

            <div class="form-group image-zone">
                <label class="form-label">产品图片（粘贴图片URL）</label>
                <div class="image-preview-area ${p.image ? 'has-img' : ''}" id="img-area-${idx}"
                    onclick="document.getElementById('inp-img-${idx}').focus()">
                    ${p.image
                        ? `<img src="${escapeHtml(p.image)}" alt="预览" onerror="onImgError(${idx})">`
                        : `<span class="preview-icon">📷</span><span>点击输入框粘贴图片URL</span><span class="image-hint">支持淘宝/京东/图床等图片链接</span>`}
                    ${p.image ? `<button class="preview-del" onclick="event.stopPropagation();delImage(${idx})">删除</button>` : ''}
                </div>
                <input type="text" class="form-input" id="inp-img-${idx}" value="${escapeHtml(p.image)}"
                    placeholder="粘贴图片URL，如：https://img.alicdn.com/xxx.jpg"
                    style="margin-top:6px;"
                    oninput="onFieldChange(${idx}, 'image', this.value)">
            </div>

            <div class="form-group">
                <label class="form-label">购买链接</label>
                <input type="url" class="form-input" id="inp-link-${idx}" value="${escapeHtml(p.link)}"
                    placeholder="https://item.taobao.com/xxx.htm"
                    oninput="onFieldChange(${idx}, 'link', this.value)">
            </div>
        `;
        grid.appendChild(card);
    });
}

// 字段变更处理
function onFieldChange(idx, field, value) {
    products[idx][field] = value;

    // 实时更新卡片标题
    if (field === 'name') {
        const titleEl = document.getElementById('title-' + idx);
        if (titleEl) titleEl.textContent = value;
    }

    // 实时更新图片预览
    if (field === 'image') {
        const area = document.getElementById('img-area-' + idx);
        if (value) {
            area.className = 'image-preview-area has-img';
            area.innerHTML = `<img src="${escapeHtml(value)}" alt="预览" onerror="onImgError(${idx})">
                <button class="preview-del" onclick="event.stopPropagation();delImage(${idx})">删除</button>`;
        } else {
            area.className = 'image-preview-area';
            area.innerHTML = `<span class="preview-icon">📷</span><span>点击输入框粘贴图片URL</span><span class="image-hint">支持淘宝/京东/图床等图片链接</span>`;
        }
    }

    scheduleSave();
}

// 图片加载失败
function onImgError(idx) {
    const area = document.getElementById('img-area-' + idx);
    area.className = 'image-preview-area';
    area.innerHTML = `<span class="preview-icon">📷</span><span>图片失效，点击重新输入URL</span><span class="image-hint">支持淘宝/京东/图床等图片链接</span>`;
    document.getElementById('inp-img-' + idx).value = '';
    products[idx].image = '';
    scheduleSave();
}

// 删除图片
function delImage(idx) {
    products[idx].image = '';
    const area = document.getElementById('img-area-' + idx);
    area.className = 'image-preview-area';
    area.innerHTML = `<span class="preview-icon">📷</span><span>点击输入框粘贴图片URL</span><span class="image-hint">支持淘宝/京东/图床等图片链接</span>`;
    document.getElementById('inp-img-' + idx).value = '';
    scheduleSave();
    updateStats();
}

// 更新统计
function updateStats() {
    const imgs = products.filter(p => p.image).length;
    const links = products.filter(p => p.link).length;
    document.getElementById('stat-images').textContent = imgs;
    document.getElementById('stat-links').textContent = links;
}

// 恢复默认
function resetAll() {
    if (!confirm('确定恢复默认数据？当前修改将全部丢失！')) return;
    products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
    saveLocal();
    renderAll();
    showToast('🔄 已恢复默认');
}

// ========== JSON ==========
function generateJson() {
    const obj = {
        site: {
            title: "中老年健康产品排行榜",
            subtitle: "专注中老年健康，精选优质营养补充剂",
            stats: { reviews: "28万+", users: "50万+", products: "100+" }
        },
        products: products
    };
    return JSON.stringify(obj, null, 4);
}

function showJsonModal() {
    document.getElementById('json-output').value = generateJson();
    document.getElementById('json-modal').classList.add('show');
}

function closeJsonModal() {
    document.getElementById('json-modal').classList.remove('show');
}

function copyJson() {
    const json = generateJson();
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(json).then(() => {
            showToast('✅ JSON已复制，发给我即可！');
            closeJsonModal();
        }).catch(() => copyFallback(json));
    } else {
        copyFallback(json);
    }
}

function copyFallback(text) {
    const ta = document.getElementById('json-output');
    ta.removeAttribute('readonly');
    ta.select();
    document.execCommand('copy');
    ta.setAttribute('readonly', true);
    showToast('✅ JSON已复制，发给我即可！');
    closeJsonModal();
}

// ========== 工具 ==========
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        closeJsonModal();
        closeChangePwd();
    }
});

// ========== 启动 ==========
checkLogin();
init();
</script>
</body>
</html>
