<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康产品排行榜 - 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 登录页 */
        #login-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #2d7a50, #4a9f71);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
        }
        #login-screen.hidden { display: none; }
        .login-box {
            background: #fff;
            padding: 40px 36px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            width: 340px;
            max-width: 90vw;
        }
        .login-icon { font-size: 48px; margin-bottom: 12px; }
        .login-title { font-size: 20px; font-weight: 700; color: #2d7a50; margin-bottom: 4px; }
        .login-sub { font-size: 13px; color: #888; margin-bottom: 24px; }
        .login-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            text-align: center;
            letter-spacing: 4px;
            font-family: inherit;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        .login-input:focus { outline: none; border-color: #4a9f71; }
        .login-input.error { border-color: #e53935; animation: shake 0.4s; }
        @keyframes shake {
            0%,100%{transform:translateX(0)}
            20%,60%{transform:translateX(-6px)}
            40%,80%{transform:translateX(6px)}
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2d7a50, #4a9f71);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .login-btn:hover { opacity: 0.9; }
        .login-hint {
            font-size: 11px;
            color: #aaa;
            margin-top: 14px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        
        /* 顶部 */
        .header {
            background: linear-gradient(135deg, #4a9f71, #2d7a50);
            color: #fff;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header h1 { font-size: 22px; margin-bottom: 4px; }
        .header p { font-size: 13px; opacity: 0.9; }
        .header-links { display: flex; gap: 10px; flex-wrap: wrap; }
        .header-links a {
            color: #fff;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            font-size: 13px;
            transition: background 0.2s;
        }
        .header-links a:hover { background: rgba(255,255,255,0.35); }
        
        /* 工具栏 */
        .toolbar {
            background: #fff;
            padding: 16px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .settings-bar {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            padding: 14px 20px;
            border-radius: 10px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 13px;
            color: #856404;
        }
        .settings-bar .lock-icon { font-size: 18px; }
        .settings-bar span { flex: 1; }
        .toolbar .info {
            font-size: 13px;
            color: #888;
            margin-right: auto;
        }
        .btn {
            padding: 9px 18px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-primary { background: #4a9f71; color: #fff; }
        .btn-primary:hover { background: #2d7a50; }
        .btn-secondary { background: #6c757d; color: #fff; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-warning:hover { background: #e0a800; }
        
        /* 提示 */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            transition: transform 0.3s;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        
        /* 产品卡片 */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
            gap: 16px;
        }
        
        @media (max-width: 540px) {
            .products-grid { grid-template-columns: 1fr; }
        }
        
        .product-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.07);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .rank-badge {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #4a9f71, #2d7a50);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            flex: 1;
        }
        .card-id {
            font-size: 11px;
            color: #aaa;
            background: #f5f5f5;
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        /* 表单 */
        .form-group {
            margin-bottom: 12px;
        }
        .form-label {
            font-size: 12px;
            color: #666;
            font-weight: 500;
            margin-bottom: 4px;
            display: block;
        }
        .form-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #4a9f71;
        }
        .form-textarea {
            resize: vertical;
            min-height: 72px;
            line-height: 1.6;
        }
        
        /* 图片预览 */
        .image-preview {
            width: 100%;
            height: 140px;
            border: 2px dashed #ddd;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
            overflow: hidden;
            background: #fafafa;
            color: #aaa;
            font-size: 13px;
            position: relative;
        }
        .image-preview:hover { border-color: #4a9f71; background: #f0fff4; }
        .image-preview.has-image { border-style: solid; border-color: #4a9f71; background: #f0fff4; }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; }
        .image-preview .placeholder { font-size: 32px; }
        .image-preview .hint { font-size: 11px; }
        .image-preview .actions {
            position: absolute;
            top: 6px;
            right: 6px;
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .image-preview:hover .actions { opacity: 1; }
        .img-btn {
            background: rgba(0,0,0,0.7);
            color: #fff;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
        }
        .img-btn:hover { background: rgba(0,0,0,0.9); }
        
        /* JSON弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9998;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #fff;
            border-radius: 12px;
            width: 100%;
            max-width: 700px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .modal-header {
            padding: 16px 20px;
            background: #4a9f71;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 15px;
            font-weight: 600;
        }
        .modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            line-height: 1;
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }
        .modal-footer {
            padding: 12px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        #json-output {
            width: 100%;
            height: 360px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            line-height: 1.5;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            resize: none;
            color: #333;
            background: #f8f8f8;
        }
        
        /* 统计 */
        .stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #fff;
            padding: 14px 20px;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            flex: 1;
            min-width: 140px;
            text-align: center;
        }
        .stat-value { font-size: 24px; font-weight: 700; color: #4a9f71; }
        .stat-label { font-size: 12px; color: #888; margin-top: 2px; }
    </style>
</head>
<body>
    <!-- 登录页 -->
    <div id="login-screen">
        <div class="login-box">
            <div class="login-icon">🔐</div>
            <div class="login-title">管理后台</div>
            <div class="login-sub">请输入访问密码</div>
            <input type="password" class="login-input" id="login-pwd" placeholder="请输入密码" maxlength="20" onkeydown="if(event.key==='Enter')doLogin()">
            <button class="login-btn" onclick="doLogin()">登 录</button>
            <div class="login-hint">请输入正确密码进入管理后台</div>
        </div>
    </div>

    <!-- 修改密码弹窗 -->
    <div id="change-pwd-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999999;align-items:center;justify-content:center;padding:20px;">
        <div style="background:#fff;border-radius:12px;padding:28px 24px;width:320px;max-width:90vw;">
            <div style="font-size:16px;font-weight:700;color:#2d7a50;margin-bottom:16px;text-align:center;">🔑 修改密码</div>
            <div style="font-size:12px;color:#888;margin-bottom:12px;">新密码（6-20位）</div>
            <input type="password" id="new-pwd" class="login-input" style="text-align:left;letter-spacing:0;" placeholder="输入新密码">
            <div style="font-size:12px;color:#888;margin:10px 0 12px;">确认新密码</div>
            <input type="password" id="confirm-pwd" class="login-input" style="text-align:left;letter-spacing:0;" placeholder="再次输入新密码" onkeydown="if(event.key==='Enter')submitChangePwd()">
            <button class="login-btn" onclick="submitChangePwd()">确认修改</button>
            <div style="text-align:center;margin-top:10px;">
                <a onclick="closeChangePwd()" style="font-size:13px;color:#888;cursor:pointer;">取消</a>
            </div>
        </div>
    </div>

    <!-- 主内容（登录后显示） -->
    <div id="main-content" style="display:none;">
    
    <div class="container">
        <!-- 顶部 -->
        <header class="header">
            <div>
                <h1>🏥 健康产品管理后台</h1>
                <p>编辑产品信息后，点击「导出JSON」复制内容发给我推送上线</p>
            </div>
            <div class="header-links">
                <a href="index.html" target="_blank">📺 预览网站</a>
                <a href="admin.html">🔄 刷新页面</a>
            </div>
        </header>
        
        <!-- 统计 -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="stat-products">10</div>
                <div class="stat-label">产品总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-images">0</div>
                <div class="stat-label">已设置图片</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-links">0</div>
                <div class="stat-label">已设置链接</div>
            </div>
        </div>
        
        <!-- 安全设置区 -->
        <div class="settings-bar">
            <span class="lock-icon">🔐</span>
            <span>当前已登录 · 密码保护中</span>
            <button class="btn btn-secondary" onclick="showChangePwd()">🔑 修改密码</button>
        </div>
        
        <!-- 工具栏 -->
        <div class="toolbar">
            <span class="info" id="save-status">💾 所有修改自动保存到本地</span>
            <button class="btn btn-warning" onclick="resetToDefault()">🔄 恢复默认</button>
            <button class="btn btn-secondary" onclick="showJsonModal()">📋 导出JSON</button>
            <button class="btn btn-primary" onclick="copyJsonToClipboard()">📋 复制JSON</button>
        </div>
        
        <!-- 产品编辑区 -->
        <div class="products-grid" id="products-grid"></div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <!-- JSON弹窗 -->
    <div class="modal-overlay" id="json-modal" onclick="if(event.target===this)closeJsonModal()">
        <div class="modal">
            <div class="modal-header">
                <span>📋 products.json 完整内容</span>
                <button class="modal-close" onclick="closeJsonModal()">×</button>
            </div>
            <div class="modal-body">
                <p style="font-size:13px;color:#666;margin-bottom:10px;">
                    复制以下内容发给我，我来帮你推送到网站 👇
                </p>
                <textarea id="json-output" readonly></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeJsonModal()">关闭</button>
                <button class="btn btn-primary" onclick="copyJsonToClipboard()">📋 复制JSON</button>
            </div>
        </div>
    </div>

    <script>
        // 默认产品数据
        const defaultProducts = [
            { id:1, rank:1, name:"氨糖健骨片", tag:"关节养护", description:"采用高纯度氨基葡萄糖盐酸盐，配合软骨素科学配比，有效修复软骨组织，缓解关节疼痛与僵硬。适合长期久坐、关节劳损的中老年人群，每日2次，每次2粒，饭后温水送服。", image:"", link:"" },
            { id:2, rank:2, name:"液体钙+维生素D3", tag:"易吸收补钙", description:"液态钙剂配合维生素D3促进钙质吸收，小分子结构更易被人体利用。预防骨质疏松、增强骨骼强度，口感好易服用，适合钙流失加速的中老年群体。", image:"", link:"" },
            { id:3, rank:3, name:"GABA睡眠软糖", tag:"温和助眠", description:"添加γ-氨基丁酸（GABA）和酸枣仁提取物，天然温和配方，帮助改善睡眠质量，缓解入睡困难、多梦易醒等问题。软糖口感好，无依赖性。", image:"", link:"" },
            { id:4, rank:4, name:"深海鱼油软胶囊", tag:"心脑养护", description:"来自北极深海纯净海域的鱼油，EPA+DHA含量高达30%，有助于调节血脂、呵护心脑血管健康。每一粒都是大自然的馈赠。", image:"", link:"" },
            { id:5, rank:5, name:"叶黄素酯软糖", tag:"眼部护理", description:"富含叶黄素酯和蓝莓花青素，双重营养共同守护眼睛健康。缓解视疲劳、过滤蓝光伤害，适合长期看手机、电视的中老年用户。", image:"", link:"" },
            { id:6, rank:6, name:"成人复合维生素B族", tag:"能量补充", description:"科学配比8种B族维生素，维持神经系统正常运作，提升精力活力，改善睡眠质量，缓解精神焦虑与疲劳感。每日1片，轻松补充。", image:"", link:"" },
            { id:7, rank:7, name:"中老年益生菌", tag:"肠道调理", description:"专为中老年肠道环境设计，含多种活性益生菌菌株，调节肠道菌群平衡，改善便秘、腹胀等肠道问题，提升整体免疫力。", image:"", link:"" },
            { id:8, rank:8, name:"葛根枳椇子片", tag:"日常养护", description:"传统草本配方，葛根配伍枳椇子、枸杞子，清肝明目、舒筋活络。适合长期饮酒、久坐办公、颈椎不适的人群日常调理使用。", image:"", link:"" },
            { id:9, rank:9, name:"中老年高钙蛋白粉", tag:"营养补充", description:"优质动植物双蛋白配方，高钙含量，配合多种维生素和矿物质，全面补充中老年人每日所需营养，增强体质、提高免疫力。", image:"", link:"" },
            { id:10, rank:10, name:"艾草颈椎腰椎贴", tag:"外用舒缓", description:"甄选艾草、红花、川芎等草本植物提取物，配合远红外陶瓷粉，持续温热理疗。贴敷舒适，哪痛贴哪，方便使用，适合关节肌肉不适人群。", image:"", link:"" }
        ];

        let products = [];
        let autoSaveTimer = null;

        // 初始化
        async function init() {
            // 先尝试从 localStorage 加载
            const saved = localStorage.getItem('admin_products');
            if (saved) {
                try {
                    products = JSON.parse(saved);
                    renderProducts();
                    updateStats();
                    return;
                } catch(e) {}
            }
            // 如果没有本地数据，尝试从 products.json 加载
            try {
                const res = await fetch('products.json');
                if (res.ok) {
                    const data = await res.json();
                    products = data.products;
                    saveLocal();
                    renderProducts();
                    updateStats();
                    return;
                }
            } catch(e) {}
            // 兜底用默认数据
            products = JSON.parse(JSON.stringify(defaultProducts));
            saveLocal();
            renderProducts();
            updateStats();
        }

        // 保存到 localStorage
        function saveLocal() {
            localStorage.setItem('admin_products', JSON.stringify(products));
        }

        // 渲染产品卡片
        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            
            products.forEach((p, idx) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="card-header">
                        <span class="rank-badge">${p.rank}</span>
                        <span class="card-title">${p.name || '（未命名）'}</span>
                        <span class="card-id">#${p.id}</span>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">产品名称</label>
                        <input class="form-input" type="text" value="${p.name}" 
                            oninput="updateProduct(${idx}, 'name', this.value)" placeholder="如：氨糖软骨素">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">标签（如：关节养护）</label>
                        <input class="form-input" type="text" value="${p.tag}" 
                            oninput="updateProduct(${idx}, 'tag', this.value)" placeholder="产品标签">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">产品介绍</label>
                        <textarea class="form-input form-textarea" 
                            oninput="updateProduct(${idx}, 'description', this.value)" 
                            placeholder="输入产品介绍内容">${p.description}</textarea>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">产品图片URL</label>
                        <div class="image-preview ${p.image ? 'has-image' : ''}" 
                            onclick="triggerImageUrlInput(${idx})">
                            ${p.image 
                                ? `<img src="${p.image}" alt="预览" onerror="this.parentElement.classList.remove('has-image');this.parentElement.innerHTML='<span class=\\'placeholder\\'>📷</span><span>粘贴图片URL</span><span class=\\'hint\\'>点击上传图片</span>'">` 
                                : `<span class="placeholder">📷</span><span>粘贴图片URL</span><span class="hint">点击上传图片</span>`}
                            ${p.image ? `<div class="actions"><button class="img-btn" onclick="event.stopPropagation();clearImage(${idx})">删除</button></div>` : ''}
                        </div>
                        <input type="text" class="form-input" id="img-url-${idx}" 
                            value="${p.image}" placeholder="粘贴图片URL（例：https://xxx.com/img.jpg）"
                            oninput="updateImageUrl(${idx}, this.value)" style="margin-top:6px;">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">购买链接</label>
                        <input class="form-input" type="url" value="${p.link}" 
                            oninput="updateProduct(${idx}, 'link', this.value)" 
                            placeholder="https://item.taobao.com/xxx.htm">
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 触发图片URL输入
        function triggerImageUrlInput(idx) {
            document.getElementById('img-url-' + idx).focus();
        }

        // 更新字段
        function updateProduct(idx, field, value) {
            products[idx][field] = value;
            scheduleSave();
            if (field === 'name') {
                // 实时更新标题
                const cards = document.querySelectorAll('.product-card');
                if (cards[idx]) {
                    cards[idx].querySelector('.card-title').textContent = value || '（未命名）';
                }
            }
        }

        // 更新图片URL
        function updateImageUrl(idx, url) {
            products[idx].image = url;
            scheduleSave();
            // 更新预览
            const card = document.querySelectorAll('.product-card')[idx];
            const preview = card.querySelector('.image-preview');
            if (url) {
                preview.classList.add('has-image');
                preview.innerHTML = `<img src="${url}" alt="预览" onerror="clearImage(${idx})">
                    <div class="actions"><button class="img-btn" onclick="event.stopPropagation();clearImage(${idx})">删除</button></div>`;
            } else {
                preview.classList.remove('has-image');
                preview.innerHTML = `<span class="placeholder">📷</span><span>粘贴图片URL</span><span class="hint">点击上传图片</span>`;
            }
            updateStats();
        }

        // 删除图片
        function clearImage(idx) {
            products[idx].image = '';
            document.getElementById('img-url-' + idx).value = '';
            scheduleSave();
            renderProducts();
            updateStats();
        }

        // 延迟自动保存（防抖）
        function scheduleSave() {
            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => {
                saveLocal();
                updateStats();
                showToast('💾 已保存');
            }, 800);
        }

        // 更新统计
        function updateStats() {
            const images = products.filter(p => p.image).length;
            const links = products.filter(p => p.link).length;
            document.getElementById('stat-images').textContent = images;
            document.getElementById('stat-links').textContent = links;
        }

        // 生成 JSON
        function generateJson() {
            const obj = {
                site: { title: "中老年健康产品排行榜", subtitle: "专注中老年健康，精选优质营养补充剂", stats: { reviews: "28万+", users: "50万+", products: "100+" } },
                products: products
            };
            return JSON.stringify(obj, null, 4);
        }

        // 显示JSON弹窗
        function showJsonModal() {
            document.getElementById('json-output').value = generateJson();
            document.getElementById('json-modal').classList.add('show');
        }

        // 关闭弹窗
        function closeJsonModal() {
            document.getElementById('json-modal').classList.remove('show');
        }

        // 复制到剪贴板
        function copyJsonToClipboard() {
            const json = generateJson();
            navigator.clipboard.writeText(json).then(() => {
                showToast('✅ JSON已复制到剪贴板，发给我即可！');
                closeJsonModal();
            }).catch(() => {
                // 降级方案
                const ta = document.getElementById('json-output');
                ta.readOnly = false;
                ta.select();
                document.execCommand('copy');
                ta.readOnly = true;
                showToast('✅ JSON已复制，发给我即可！');
                closeJsonModal();
            });
        }

        // 恢复默认
        function resetToDefault() {
            if (!confirm('确定要恢复默认数据吗？当前修改会丢失！')) return;
            products = JSON.parse(JSON.stringify(defaultProducts));
            saveLocal();
            renderProducts();
            updateStats();
            showToast('🔄 已恢复默认数据');
        }

        // 显示提示
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // ESC 关闭弹窗
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeJsonModal();
        });

        init();
        
        // ========== 登录相关 ==========
        const DEFAULT_PWD = 'jkbang2026';
        
        function getPassword() {
            return localStorage.getItem('admin_pwd') || DEFAULT_PWD;
        }
        
        function doLogin() {
            const pwd = document.getElementById('login-pwd').value;
            const storedPwd = getPassword();
            if (pwd === storedPwd) {
                sessionStorage.setItem('admin_logged_in', '1');
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').style.display = 'block';
            } else {
                const input = document.getElementById('login-pwd');
                input.classList.add('error');
                input.value = '';
                input.placeholder = '密码错误，请重试';
                setTimeout(() => {
                    input.classList.remove('error');
                    input.placeholder = '请输入密码';
                }, 1200);
            }
        }
        
        function showChangePwd() {
            document.getElementById('change-pwd-modal').style.display = 'flex';
        }
        
        function closeChangePwd() {
            document.getElementById('change-pwd-modal').style.display = 'none';
            document.getElementById('new-pwd').value = '';
            document.getElementById('confirm-pwd').value = '';
        }
        
        function submitChangePwd() {
            const newPwd = document.getElementById('new-pwd').value;
            const confirmPwd = document.getElementById('confirm-pwd').value;
            if (newPwd.length < 6 || newPwd.length > 20) {
                alert('密码长度需6-20位');
                return;
            }
            if (newPwd !== confirmPwd) {
                alert('两次密码不一致');
                return;
            }
            localStorage.setItem('admin_pwd', newPwd);
            closeChangePwd();
            showToast('✅ 密码修改成功！');
        }
        
        // 页面加载时检查登录状态
        function checkLogin() {
            if (sessionStorage.getItem('admin_logged_in') === '1') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').style.display = 'block';
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('login-pwd').focus();
            }
        }
        
        // 登出按钮
        function addLogoutBtn() {
            const toolbar = document.querySelector('.toolbar');
            if (!toolbar) return;
            const btn = document.createElement('button');
            btn.className = 'btn btn-secondary';
            btn.style.cssText = 'margin-left:auto;background:#e53935;';
            btn.innerHTML = '🚪 退出登录';
            btn.onclick = () => {
                sessionStorage.removeItem('admin_logged_in');
                location.reload();
            };
            toolbar.appendChild(btn);
        }
        
        // 页面加载时检查 + 加登出按钮
        checkLogin();
        addLogoutBtn();
        
        init();
    </script>
    
    <!-- 关闭主内容div -->
    </div>
</html>
